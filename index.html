<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Page</title>
     <link rel="stylesheet" href ="hey.css">
</head>
<body>
    <div class="container">
        <section class="hero">
           <img src="login-illustration.png" alt="Login Illustration">
        </section>
        <section class="main">
               <h1>Sign In</h1>
        <p class="welcome">Welcome Back</p>

        
        
            <form class="box1">
                <label for = "name">Username:</label>
                <input type ="text" id="name" placeholder="Enter username" minlength="3" required>
                <br><br>
                <label for ="email">Email Address:</label>
                  <input type ="email" id="email" placeholder="Enter email" required>
                  <br><br>
                  <label for="password">Password:</label>
                    <input type ="password" id="password" placeholder="Enter password" minlength="6" required>
                    <br><br>
                    <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
                    <br><br>
                    <button class="submit" type="submit">Sign In</button>
                    <p class="or">OR</p>

<button type="button" class="google-btn">
    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google Logo">Sign in with Google</button>
                   <p class="signup">
    Don't have an account?
    <a href="signup.html">Sign Up</a>
</p>

            </form>
     </section>
        
        



    </div>
    
</body>
</html>
